<span class=val><time itemprop=datePublished datetime="2021-03-21 22:36:11">2021-03-21 22:36:11</time></span></div><h1 class=headline itemprop=headline>理解先行还是顺应先行</h1><section class=body itemprop=articleBody><p>我思考了很多问题。实际上，都是吃了不少苦头思考的。并且思考很多之后，苦头还是不断的吃。</p><p>这种现象视乎暗示了一个道理。思考和吃苦头的联系。</p><p>思考能够解惑事情的发展过程和发展逻辑。包括可以在后续的过程中纠错。但是，思考暗含着一种必须试错的阶段。小错无伤大错无法承受，人生中的大错是要严格避免的，反而小错无所谓所以。这种模式严谨的讲，在关键时刻存在严重问题。</p></section></article></main><div id=gitalk-container></div><link rel=stylesheet href=https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css><script src=https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.min.js></script><script>const gitalk=new Gitalk({clientID:'dcf0c61ac0ce08c3c9cc',clientSecret:'a8e5a8b611b5e9083e004ee5f0122095cf7e6f43',repo:'fanlushuai.github.io',owner:'fanlushuai',admin:['fanlushuai'],id:decodeURI(location.pathname),distractionFreeMode:false});(function(){if(["localhost","127.0.0.1"].indexOf(window.location.hostname)!=-1){document.getElementById('gitalk-container').innerHTML='Gitalk comments not available by default when the website is previewed locally.';return;}
